  .chart-wrap { background: #1a1d27; border-radius: 12px; padding: 20px; margin-bottom: 20px; max-width: 1100px; margin-left: auto; margin-right: auto; }

const roundColors = ['#78909C','#4FC3F7','#81C784','#FFB74D','#BA68C8','#FFD700'];

// Championship bar chart - top 16

const champCtx = document.getElementById('champBar').getContext('2d');

  type: 'bar',
  data: {
    labels: top16.map(t => t.name),
    datasets: [{
      label: 'Championship %',
      data: top16.map(t => t.rounds[5]),
      backgroundColor: top16.map(t => {
        const r = teamRegion[t.name];
        return regionColors[r] || '#888';
      }),
      borderRadius: 6,
      barThickness: 32,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + '%' } }
    },
    scales: {
      y: {
        ticks: { color: '#888', callback: v => v + '%' },
        grid: { color: '#2a2d3a' },

    }

// Funnel chart - top 8 teams, line chart showing advancement

  type: 'line',
  data: {
    labels: roundLabels,
    datasets: top8.map((t, i) => ({
      label: t.name,
      data: t.rounds,
      borderColor: lineColors[i],
      backgroundColor: lineColors[i] + '22',
      borderWidth: 2.5,
      pointRadius: 4,
      pointBackgroundColor: lineColors[i],
      tension: 0.3,
      fill: false,
    }))
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: 'top',
        labels: { color: '#bbb', font: { size: 11 }, boxWidth: 14, padding: 10 }
      },
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%` } }
    },
    scales: {
      y: {
        max: 100,
        ticks: { color: '#888', callback: v => v + '%' },
        grid: { color: '#2a2d3a' },
        title: { display: true, text: 'Probability', color: '#888' }
      },

// Full table
const tbl = document.getElementById('advTable');
let html = '<thead><tr><th style="min-width:150px">Team</th><th>Region</th>';
roundLabels.forEach(l => html += `<th>${l}</th>`);
html += '</tr></thead><tbody>';

function heatColor(val, maxVal) {
  if (val === 0) return 'transparent';
  const intensity = Math.min(val / (maxVal || 25), 1);
  const r = Math.round(255 * intensity);
  const g = Math.round(180 * intensity);
  const b = Math.round(50 * intensity * 0.3);
  return `rgba(${r},${g},${b},${0.15 + intensity * 0.55})`;
}

const regionTagClass = { East: 'region-East', West: 'region-West', South: 'region-South', Midwest: 'region-Midwest' };
const maxVals = [100, 94, 87, 69, 47, 32]; // for heat scaling per column

teams.forEach(t => {
  const region = teamRegion[t.name] || '?';
  html += `<tr><td style="font-weight:600">${t.name}</td>`;
  html += `<td><span class="region-tag ${regionTagClass[region] || ''}">${region}</span></td>`;
  t.rounds.forEach((v, i) => {
    const bg = heatColor(v, maxVals[i]);
    html += `<td class="heat-cell" style="background:${bg}">${v > 0 ? v.toFixed(1) + '%' : '—'}</td>`;
  });
  html += '</tr>';
});
html += '</tbody>';
tbl.innerHTML = html;
